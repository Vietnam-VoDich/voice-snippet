name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26  # macOS 26 SDK required for FoundationModels
    steps:
      - uses: actions/checkout@v4

      - name: Build VoiceSnippet.app
        run: ./scripts/make-app.sh

      - name: Package app as tarball
        run: tar -czf VoiceSnippet.app.tar.gz -C dist VoiceSnippet.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceSnippet.app
          path: VoiceSnippet.app.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VoiceSnippet.app.tar.gz
          generate_release_notes: true
